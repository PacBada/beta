<<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #000; position: fixed; top: 0; left: 0;
        }
        #unity-container {
            width: 100vw; height: 100vh; background: #000;
            display: flex; justify-content: center; align-items: center;
            position: fixed; top: 0; left: 0;
        }
        #unity-canvas {
            background: #000; display: block;
            width: 100vw; height: 100vh;
        }
        #loading-area {
            position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: Arial; z-index: 20; text-align: center;
            width: 80%; max-width: 400px;
        }
        #progress-bg {
            width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 12px 0 0;
        }
        #progress-fill {
            width: 0%; height: 100%; background: #00ccff; border-radius: 3px; transition: width 0.2s;
        }
        #error-msg {
            color: #ff5555; font-size: 14px; margin-top: 20px; word-break: break-all;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-area">
        <div id="loading-status">加载中...</div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="error-msg"></div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // =========================================================
        // !!! 请确保这 3 个文件名和你 Build 文件夹里的完全一致 !!!
        // =========================================================
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",   // 已修正：加上了 Build/
        };

        // =========================================================
        // 画面矫正函数
        // =========================================================
        var canvas = document.getElementById("unity-canvas");
        var GAME_W = 1280;
        var GAME_H = 720;
        var RATIO = GAME_W / GAME_H;

        function fitCanvas() {
            if (!canvas) return;
            var sw = window.innerWidth;
            var sh = window.innerHeight;
            if (sw === 0 || sh === 0) return;
            
            var dw, dh;
            if (sw / sh > RATIO) {
                dh = sh;
                dw = sh * RATIO;
            } else {
                dw = sw;
                dh = sw / RATIO;
            }
            dw = Math.floor(dw);
            dh = Math.floor(dh);

            canvas.style.width = dw + "px";
            canvas.style.height = dh + "px";
            canvas.style.position = "absolute";
            canvas.style.left = "50%";
            canvas.style.top = "50%";
            canvas.style.transform = "translate(-50%, -50%)";
        }

        window.addEventListener("resize", fitCanvas);
        window.addEventListener("orientationchange", function() {
            setTimeout(fitCanvas, 500);
        });

        // =========================================================
        // Unity 加载逻辑
        // =========================================================
        var statusEl = document.getElementById("loading-status");
        var fillEl = document.getElementById("progress-fill");
        var errorEl = document.getElementById("error-msg");

        if (!window.WebGLRenderingContext) {
            statusEl.innerHTML = "浏览器不支持 WebGL";
            throw new Error("No WebGL");
        }

        var config = {
            dataUrl: buildFiles.dataUrl,
            frameworkUrl: buildFiles.loaderUrl,
            codeUrl: buildFiles.wasmUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "PacBada",
            productVersion: "1.0",
            showBanner: false,
        };

        function onProgress(progress) {
            var pct = Math.min(100, Math.round(progress * 100));
            fillEl.style.width = pct + "%";
            statusEl.innerHTML = "加载中 " + pct + "%";
            if (pct >= 100) {
                document.getElementById("loading-area").style.display = "none";
            }
        }

        function onSuccess(instance) {
            document.getElementById("loading-area").style.display = "none";
            console.log("游戏启动成功！");
            setTimeout(fitCanvas, 100);
            setTimeout(fitCanvas, 500);
        }

        function onError(err) {
            statusEl.innerHTML = "❌ 加载失败";
            errorEl.style.display = "block";
            errorEl.innerHTML = "错误详情：<br>" + (err.message || err);
            console.error("Unity 加载错误:", err);
            
            if (err.toString().indexOf("404") !== -1 || err.toString().indexOf("Not Found") !== -1) {
                errorEl.innerHTML += "<br><br>⚠️ 提示：可能是 Build 文件夹里的文件名和代码中的不一致，请去 Build 文件夹核实文件名并修改代码。";
            }
        }

        setTimeout(fitCanvas, 10);

        // 开始加载
        createUnityInstance(canvas, config, onProgress)
            .then(onSuccess)
            .catch(onError);
    </script>
</body>
</html>
