<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-canvas {
            background: #000;
            display: block;
            /* 尺寸由 JS 精确控制 */
        }
        #loading-area {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            z-index: 20;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        #progress-bg {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 12px 0 0;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #00ccff;
            border-radius: 3px;
            transition: width 0.2s;
        }
        #error-msg {
            color: #ff5555;
            font-size: 14px;
            margin-top: 20px;
            word-break: break-all;
            display: none;
        }
        /* 横屏提示遮罩 */
        #rotate-tip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #rotate-tip span {
            font-size: 16px;
            color: #aaa;
            margin-top: 10px;
        }
        @media (orientation: portrait) {
            #rotate-tip { display: flex !important; }
        }
        @media (orientation: landscape) {
            #rotate-tip { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 横屏提示 -->
    <div id="rotate-tip">
        📱⤵️Please rotate your phone
        <span>（Automatically enter after rotating the phone）</span>
    </div>

    <!-- 加载进度 -->
    <div id="loading-area">
        <div id="loading-status">加载中...</div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="error-msg"></div>
    </div>

    <!-- 游戏容器 -->
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // =========================================================
        // 1. 文件路径配置（请确保和 Build 文件夹里的文件名完全一致）
        // =========================================================
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        // =========================================================
        // 2. Canvas 精确缩放（彻底解决拉伸）
        // =========================================================
        var canvas = document.getElementById("unity-canvas");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;

        function fitCanvas() {
            if (!canvas) return;
            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            if (screenW === 0 || screenH === 0) return;

            var screenRatio = screenW / screenH;
            var displayW, displayH;

            // 等比缩放，保持完整画面（可能有黑边）
            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }

            displayW = Math.round(displayW);
            displayH = Math.round(displayH);

            canvas.style.width = displayW + 'px';
            canvas.style.height = displayH + 'px';
            canvas.style.position = 'absolute';
            canvas.style.left = '50%';
            canvas.style.top = '50%';
            canvas.style.transform = 'translate(-50%, -50%)';
            canvas.style.background = '#000';
        }

        window.addEventListener('resize', fitCanvas);
        window.addEventListener('orientationchange', function() {
            setTimeout(fitCanvas, 600);
        });

        // =========================================================
        // 3. 状态元素
        // =========================================================
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');

        if (!window.WebGLRenderingContext) {
            statusEl.innerHTML = '浏览器不支持 WebGL';
            throw new Error('No WebGL');
        }

        // =========================================================
        // 4. 手动加载 framework.js 和 loader.js（绕开自动加载失败）
        // =========================================================
        var frameworkLoaded = false;
        var loaderLoaded = false;

        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded) {
                console.log('✅ framework.js 和 loader.js 都已加载');
                if (typeof unityFramework !== 'undefined') {
                    console.log('✅ unityFramework 已定义');
                } else {
                    console.error('❌ unityFramework 未定义');
                    statusEl.innerHTML = '❌ unityFramework 未定义';
                    return;
                }
                if (typeof createUnityInstance !== 'undefined') {
                    console.log('✅ createUnityInstance 已定义，开始加载游戏');
                    startUnity();
                } else {
                    console.error('❌ createUnityInstance 未定义');
                    statusEl.innerHTML = '❌ createUnityInstance 未定义';
                }
            }
        }

        // 手动加载 framework.js
        var frameworkScript = document.createElement('script');
        frameworkScript.src = buildFiles.frameworkUrl;
        frameworkScript.onload = function() {
            console.log('✅ framework.js 加载完成');
            frameworkLoaded = true;
            checkAndStart();
        };
        frameworkScript.onerror = function() {
            console.error('❌ framework.js 加载失败');
            statusEl.innerHTML = '❌ framework.js 加载失败';
        };
        document.head.appendChild(frameworkScript);

        // 手动加载 loader.js
        var loaderScript = document.createElement('script');
        loaderScript.src = buildFiles.loaderUrl;
        loaderScript.onload = function() {
            console.log('✅ loader.js 加载完成');
            loaderLoaded = true;
            checkAndStart();
        };
        loaderScript.onerror = function() {
            console.error('❌ loader.js 加载失败');
            statusEl.innerHTML = '❌ loader.js 加载失败';
        };
        document.head.appendChild(loaderScript);

        // =========================================================
        // 5. Unity 启动函数（含强制适配逻辑）
        // =========================================================
        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };

            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) {
                    document.getElementById('loading-area').style.display = 'none';
                }
            }

            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                console.log('🎮 游戏启动成功！');

                // ★ 核心修复：反复强制触发 resize 和全屏切换
                var attempts = 0;
                var maxAttempts = 8;
                var interval = setInterval(function() {
                    attempts++;
                    console.log('🔄 强制刷新适配 #' + attempts);
                    // 触发 resize 事件
                    window.dispatchEvent(new Event('resize'));
                    // 重新矫正 Canvas
                    fitCanvas();
                    // 尝试调用 Unity 实例的 SetFullscreen 来强制刷新渲染
                    if (instance && typeof instance.SetFullscreen === 'function') {
                        try {
                            instance.SetFullscreen(false);
                            setTimeout(function() {
                                instance.SetFullscreen(true);
                            }, 50);
                        } catch (e) {
                            console.warn('SetFullscreen 调用失败:', e);
                        }
                    }
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        console.log('✅ 适配刷新完成');
                    }
                }, 300);

                // 额外延时触发
                setTimeout(function() {
                    window.dispatchEvent(new Event('resize'));
                    fitCanvas();
                }, 1000);
                setTimeout(function() {
                    window.dispatchEvent(new Event('resize'));
                    fitCanvas();
                }, 2000);
            }

            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
                console.error('Unity 加载错误:', err);
            }

            // 先矫正一次
            setTimeout(fitCanvas, 50);

            // 开始加载 Unity
            createUnityInstance(canvas, config, onProgress)
                .then(onSuccess)
                .catch(onError);
        }

        // 初始矫正
        setTimeout(fitCanvas, 50);
    </script>
</body>
</html>
