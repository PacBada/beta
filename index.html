<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-canvas {
            background: #000;
            display: block;
        }
        #loading-area {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            z-index: 20;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        #progress-bg {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 12px 0 0;
        }
        #progress-fill {
            width: 100%;
            height: 100%;
            background: #00ccff;
            border-radius: 3px;
        }
        #error-msg {
            color: #ff5555;
            font-size: 14px;
            margin-top: 20px;
            word-break: break-all;
            display: none;
        }
        #rotate-tip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #rotate-tip span {
            font-size: 16px;
            color: #aaa;
            margin-top: 10px;
        }
        @media (orientation: portrait) {
            #rotate-tip { display: flex !important; }
        }
        @media (orientation: landscape) {
            #rotate-tip { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="rotate-tip">
        📱⤵️Please rotate your phone
        <span>（Automatically enter after rotating the phone）</span>
    </div>

    <div id="loading-area">
        <div id="loading-status">加载中...</div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="error-msg"></div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // =========================================================
        // 1. 配置
        // =========================================================
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        var canvas = document.getElementById("unity-canvas");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;

        // 保存 Unity 实例（用于调用 SetResolution）
        var unityInstance = null;

        // =========================================================
        // 2. Canvas CSS 等比缩放
        // =========================================================
        function fitCanvas() {
            if (!canvas) return;
            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            if (screenW === 0 || screenH === 0) return;

            var screenRatio = screenW / screenH;
            var displayW, displayH;

            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }

            displayW = Math.round(displayW);
            displayH = Math.round(displayH);

            canvas.style.width = displayW + 'px';
            canvas.style.height = displayH + 'px';
            canvas.style.position = 'absolute';
            canvas.style.left = '50%';
            canvas.style.top = '50%';
            canvas.style.transform = 'translate(-50%, -50%)';
            canvas.style.background = '#000';
        }

        // ★ 供 Unity 调用的全局刷新函数（倒计时结束时触发）
        window.refreshGameCanvas = function() {
            console.log('Unity 请求强制刷新分辨率');
            // 先保证 CSS 尺寸正确
            fitCanvas();
            // 关键步骤：强制 Unity 重新设置渲染分辨率为设计分辨率
            if (unityInstance && typeof unityInstance.SetResolution === 'function') {
                unityInstance.SetResolution(GAME_W, GAME_H);
                console.log('已调用 SetResolution(' + GAME_W + ', ' + GAME_H + ')');
            } else {
                console.warn('Unity 实例不可用，尝试备用方案');
                // 备用：派发 resize 事件
                window.dispatchEvent(new Event('resize'));
            }
        };

        window.addEventListener('resize', fitCanvas);
        window.addEventListener('orientationchange', function() {
            setTimeout(fitCanvas, 600);
        });

        // =========================================================
        // 3. 加载状态
        // =========================================================
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');

        if (!window.WebGLRenderingContext) {
            statusEl.innerHTML = '浏览器不支持 WebGL';
            throw new Error('No WebGL');
        }

        // =========================================================
        // 4. 手动加载 framework.js 和 loader.js
        // =========================================================
        var frameworkLoaded = false;
        var loaderLoaded = false;

        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded) {
                if (typeof unityFramework !== 'undefined' && typeof createUnityInstance !== 'undefined') {
                    console.log('✅ 所有依赖已就绪，启动 Unity');
                    startUnity();
                } else {
                    statusEl.innerHTML = '❌ 缺少核心函数';
                }
            }
        }

        var frameworkScript = document.createElement('script');
        frameworkScript.src = buildFiles.frameworkUrl;
        frameworkScript.onload = function() { frameworkLoaded = true; checkAndStart(); };
        frameworkScript.onerror = function() { statusEl.innerHTML = '❌ framework.js 加载失败'; };
        document.head.appendChild(frameworkScript);

        var loaderScript = document.createElement('script');
        loaderScript.src = buildFiles.loaderUrl;
        loaderScript.onload = function() { loaderLoaded = true; checkAndStart(); };
        loaderScript.onerror = function() { statusEl.innerHTML = '❌ loader.js 加载失败'; };
        document.head.appendChild(loaderScript);

        // =========================================================
        // 5. 启动 Unity
        // =========================================================
        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };

            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) document.getElementById('loading-area').style.display = 'none';
            }

            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                console.log('🎮 游戏启动成功');
                unityInstance = instance;          // ★ 保存实例
                fitCanvas();
                // 启动后立即强制一次分辨率，避免初始错位
                instance.SetResolution(GAME_W, GAME_H);
                console.log('初始分辨率已设置为 ' + GAME_W + 'x' + GAME_H);
            }

            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
                console.error('Unity 加载错误:', err);
            }

            setTimeout(fitCanvas, 50);
            createUnityInstance(canvas, config, onProgress).then(onSuccess).catch(onError);
        }

        // 初始矫正
        setTimeout(fitCanvas, 50);
    </script>
</body>
</html>
