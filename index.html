<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>吃豆人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        #unity-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        #unity-canvas {
            display: block;
            image-rendering: crisp-edges;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        /* 加载进度条样式 */
        #unity-loading-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        #unity-logo {
            width: 200px;
            height: 100px;
            background: url('TemplateData/logo.png') no-repeat center;
            background-size: contain;
            margin-bottom: 20px;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 20px;
            background: #333333;
            border-radius: 10px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #FFD700;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #unity-loading-text {
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 18px;
            margin-top: 15px;
        }

        /* 横屏提示遮罩 */
        #orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        #orientation-warning .icon {
            font-size: 80px;
            animation: rotate-phone 2s ease-in-out infinite;
        }

        @keyframes rotate-phone {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-90deg); }
            75% { transform: rotate(-90deg); }
        }

        #orientation-warning .text {
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 24px;
            margin-top: 30px;
            text-align: center;
        }

        /* 移动端全屏按钮（可选） */
        #fullscreen-button {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #FFFFFF;
            border-radius: 8px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            font-size: 20px;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
        
        <!-- 加载进度条 -->
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div id="unity-loading-text">Loading... 0%</div>
        </div>
    </div>

    <!-- 横屏提示 -->
    <div id="orientation-warning">
        <div class="icon">📱</div>
        <div class="text">请将手机横屏放置<br>以开始游戏</div>
    </div>

    <!-- 全屏按钮 -->
    <div id="fullscreen-button">⛶</div>

    <script>
        // ============================================
        // 全局变量
        // ============================================
        var unityCanvas = document.getElementById('unity-canvas');
        var loadingBar = document.getElementById('unity-loading-bar');
        var progressBarFull = document.getElementById('unity-progress-bar-full');
        var progressText = document.getElementById('unity-loading-text');
        var orientationWarning = document.getElementById('orientation-warning');
        var fullscreenButton = document.getElementById('fullscreen-button');
        var unityInstance = null;

        // 目标分辨率（横屏）
        var TARGET_WIDTH = 1280;
        var TARGET_HEIGHT = 720;

        // ============================================
        // Canvas自适应核心函数
        // ============================================
        function resizeCanvas() {
            if (!unityCanvas) {
                unityCanvas = document.querySelector('canvas');
                if (!unityCanvas) return;
            }

            var screenWidth = window.innerWidth;
            var screenHeight = window.innerHeight;

            // 计算等比缩放比例，确保完整显示
            var scaleX = screenWidth / TARGET_WIDTH;
            var scaleY = screenHeight / TARGET_HEIGHT;
            var scale = Math.min(scaleX, scaleY);

            // 设置CSS尺寸
            unityCanvas.style.width = Math.floor(TARGET_WIDTH * scale) + 'px';
            unityCanvas.style.height = Math.floor(TARGET_HEIGHT * scale) + 'px';

            // 强制设置Canvas实际分辨率（关键！）
            if (unityCanvas.width !== TARGET_WIDTH || unityCanvas.height !== TARGET_HEIGHT) {
                unityCanvas.width = TARGET_WIDTH;
                unityCanvas.height = TARGET_HEIGHT;
            }
        }

        // ============================================
        // 横屏检测
        // ============================================
        function checkOrientation() {
            var isLandscape = window.innerWidth > window.innerHeight;
            
            if (isLandscape) {
                orientationWarning.style.display = 'none';
                fullscreenButton.style.display = 'flex';
                // 横屏时刷新Canvas
                setTimeout(resizeCanvas, 50);
            } else {
                orientationWarning.style.display = 'flex';
                fullscreenButton.style.display = 'none';
            }
        }

        // ============================================
        // 全屏功能
        // ============================================
        function toggleFullscreen() {
            var doc = window.document;
            var docEl = doc.documentElement;

            var requestFullScreen = docEl.requestFullscreen || 
                                    docEl.mozRequestFullScreen || 
                                    docEl.webkitRequestFullScreen || 
                                    docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || 
                                   doc.mozCancelFullScreen || 
                                   doc.webkitExitFullscreen || 
                                   doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && 
                !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                // 进入全屏后锁定横屏
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(function() {});
                }
            } else {
                cancelFullScreen.call(doc);
            }
        }

        // ============================================
        // Canvas变化监听器（终极修复）
        // ============================================
        function setupCanvasObserver() {
            if (!unityCanvas) return;

            var observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'attributes' && 
                        (mutation.attributeName === 'width' || mutation.attributeName === 'height')) {
                        // Unity内部修改了Canvas尺寸，立即强制恢复
                        requestAnimationFrame(function() {
                            resizeCanvas();
                        });
                    }
                });
            });

            observer.observe(unityCanvas, { 
                attributes: true,
                attributeFilter: ['width', 'height']
            });
        }

        // ============================================
        // Unity加载配置
        // ============================================
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            #if MEMORY_FILENAME
            memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
            #endif
            #if SYMBOLS_FILENAME
            symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
            #endif
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
            matchWebGLToCanvasSize: false,  // 重要：禁止Unity自动匹配Canvas尺寸
            devicePixelRatio: 1             // 固定为1，防止高DPI屏幕导致坐标错乱
        };

        // ============================================
        // Unity进度回调
        // ============================================
        function onUnityProgress(progress) {
            var percent = Math.round(progress * 100);
            progressBarFull.style.width = percent + '%';
            progressText.textContent = 'Loading... ' + percent + '%';
        }

        // ============================================
        // Unity加载完成回调
        // ============================================
        function onUnityReady() {
            // 隐藏加载条
            loadingBar.style.display = 'none';
            
            // 强制刷新Canvas
            setTimeout(function() {
                resizeCanvas();
                // 二次确认，延迟再刷一次
                requestAnimationFrame(function() {
                    resizeCanvas();
                });
            }, 100);

            // 启动Canvas监听
            setupCanvasObserver();
            
            // 检查横屏状态
            checkOrientation();
        }

        // ============================================
        // 全局暴露Canvas修复函数（供jslib调用）
        // ============================================
        window.FixCanvasSize = function() {
            // 立即执行
            resizeCanvas();
            // 延迟确保Unity渲染完成
            setTimeout(function() {
                resizeCanvas();
                // 再次确认
                requestAnimationFrame(function() {
                    resizeCanvas();
                });
            }, 150);
        };

        // ============================================
        // 事件监听
        // ============================================
        window.addEventListener('resize', function() {
            checkOrientation();
            resizeCanvas();
        });

        window.addEventListener('orientationchange', function() {
            // 延迟执行，等浏览器完成旋转
            setTimeout(function() {
                checkOrientation();
                resizeCanvas();
            }, 300);
        });

        fullscreenButton.addEventListener('click', toggleFullscreen);
        fullscreenButton.addEventListener('touchend', function(e) {
            e.preventDefault();
            toggleFullscreen();
        });

        // 防止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 防止手势缩放
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
        });

        document.addEventListener('gestureend', function(e) {
            e.preventDefault();
        });

        // ============================================
        // 页面加载完成后启动Unity
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始检查
            checkOrientation();
            
            // 创建Unity实例
            createUnityInstance(unityCanvas, config, onUnityProgress)
                .then(function(instance) {
                    unityInstance = instance;
                    onUnityReady();
                })
                .catch(function(error) {
                    console.error('Unity加载失败:', error);
                    progressText.textContent = '加载失败，请刷新页面';
                    progressText.style.color = '#FF4444';
                });
        });

        // ============================================
        // 页面卸载时清理
        // ============================================
        window.addEventListener('beforeunload', function() {
            if (unityInstance) {
                unityInstance.Quit();
            }
        });
    </script>
</body>
</html>
