<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#000; position:fixed; top:0; left:0; }
        #unity-container { width:100vw; height:100vh; background:#000; display:flex; justify-content:center; align-items:center; position:fixed; top:0; left:0; }
        #unity-canvas { background:#000; display:block; }
        #loading-area { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); color:#fff; font-family:Arial,sans-serif; z-index:20; text-align:center; width:80%; max-width:400px; }
        #progress-bg { width:100%; height:6px; background:#333; border-radius:3px; margin:12px 0 0; }
        #progress-fill { width:0%; height:100%; background:#00ccff; border-radius:3px; }
        #error-msg { color:#ff5555; font-size:14px; margin-top:20px; word-break:break-all; display:none; }
        #rotate-tip { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#fff; font-size:24px; display:none; justify-content:center; align-items:center; z-index:9999; flex-direction:column; text-align:center; font-family:Arial,sans-serif; }
        #rotate-tip span { font-size:16px; color:#aaa; margin-top:10px; }

        /* 透明解锁层：覆盖 Canvas，不占据额外空间，解锁后变为穿透 */
        #unlock-layer {
            position: absolute;
            top: 0; left: 0;
            background: transparent;
            z-index: 10;
            pointer-events: auto;   /* 初始可点击 */
        }

        @media (orientation: portrait) { #rotate-tip { display:flex !important; } }
        @media (orientation: landscape) { #rotate-tip { display:none !important; } }
    </style>
</head>
<body>

    <div id="rotate-tip">📱⤵️Please rotate your phone<span>(Automatically enter after rotating)</span></div>
    <div id="loading-area"><div id="loading-status">加载中...</div><div id="progress-bg"><div id="progress-fill"></div></div><div id="error-msg"></div></div>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unlock-layer"></div>
    </div>

    <script>
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        var canvas = document.getElementById("unity-canvas");
        var unlockLayer = document.getElementById("unlock-layer");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;
        var dpr = window.devicePixelRatio || 1;
        var unityInstance = null;
        var audioUnlocked = false;

        // ========== 1. 同步透明层尺寸与 Canvas 完全一致 ==========
        function syncUnlockLayerSize() {
            if (!unlockLayer) return;
            unlockLayer.style.width = canvas.style.width;
            unlockLayer.style.height = canvas.style.height;
            // 由于父容器使用 flex 居中，透明层用绝对定位时，需要手动居中，但不设置 left/top，而是依赖父容器的相对定位？
            // 父容器 #unity-container 没有设置 position:relative，但绝对定位会相对于最近的定位祖先，
            // 因此我们需要将 #unity-container 设为 position:relative，或者在透明层上使用与 Canvas 相同的 transform 居中方式。
            // 简便方法：将透明层的尺寸设置好后，使用与 Canvas 相同的绝对居中技巧：
            unlockLayer.style.left = '50%';
            unlockLayer.style.top = '50%';
            unlockLayer.style.transform = 'translate(-50%, -50%)';
        }

        // 修改 #unity-container 的样式，使其成为定位参考
        document.getElementById('unity-container').style.position = 'relative';

        // ========== 2. Canvas 修正（保留已验证的快速修正） ==========
        function getTargetSize() {
            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            if (screenW === 0 || screenH === 0) return null;
            var screenRatio = screenW / screenH;
            var displayW, displayH;
            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }
            displayW = Math.round(displayW);
            displayH = Math.round(displayH);
            return { cssW: displayW, cssH: displayH, realW: displayW * dpr, realH: displayH * dpr };
        }

        function silentCorrect() {
            var size = getTargetSize();
            if (!size) return;
            if (canvas.style.width !== size.cssW + 'px' || canvas.style.height !== size.cssH + 'px') {
                canvas.style.width = size.cssW + 'px';
                canvas.style.height = size.cssH + 'px';
            }
            if (canvas.width !== size.realW || canvas.height !== size.realH) {
                canvas.width = size.realW;
                canvas.height = size.realH;
                if (unityInstance && typeof unityInstance.SetResolution === 'function') {
                    unityInstance.SetResolution(size.realW, size.realH);
                }
            }
            syncUnlockLayerSize();   // 每次修正后保持透明层覆盖
        }

        var observer = new ResizeObserver(function() {
            clearTimeout(window.__observerFixTimer);
            window.__observerFixTimer = setTimeout(silentCorrect, 50);
        });
        observer.observe(canvas);

        window.addEventListener('resize', function() {
            clearTimeout(window.__resizeTimer);
            window.__resizeTimer = setTimeout(function() {
                dpr = window.devicePixelRatio || 1;
                silentCorrect();
            }, 200);
        });
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                dpr = window.devicePixelRatio || 1;
                silentCorrect();
                setTimeout(silentCorrect, 600);
            }, 600);
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                setTimeout(function() {
                    dpr = window.devicePixelRatio || 1;
                    silentCorrect();
                }, 300);
            }
        });

        // ========== 3. 音频解锁：只 resume，且将透明层变为穿透 ==========
        function unlockAudio(e) {
            if (audioUnlocked) return;
            audioUnlocked = true;

            // 仅 resume Unity 的 AudioContext
            if (unityInstance && unityInstance.Module) {
                var ctx = unityInstance.Module.audioContext || unityInstance.Module.WebAudioContext || unityInstance.Module.ctx;
                if (ctx && ctx.state === 'suspended') {
                    ctx.resume().then(function() {
                        console.log('🔊 AudioContext resumed');
                    }).catch(function(err) {
                        console.warn('resume failed:', err);
                    });
                }
            }

            // 将透明层设为点击穿透，不移除元素，避免布局变化
            unlockLayer.style.pointerEvents = 'none';
            console.log('🎵 音频已解锁，透明层现已穿透');
        }

        unlockLayer.addEventListener('click', unlockAudio, { once: true });
        unlockLayer.addEventListener('touchstart', unlockAudio, { once: true });

        // ========== 4. 加载 Unity ==========
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');
        if (!window.WebGLRenderingContext) { statusEl.innerHTML = '浏览器不支持 WebGL'; throw new Error('No WebGL'); }

        var frameworkLoaded = false, loaderLoaded = false;
        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded && typeof unityFramework !== 'undefined' && typeof createUnityInstance !== 'undefined') {
                startUnity();
            }
        }

        var fs = document.createElement('script'); fs.src = buildFiles.frameworkUrl;
        fs.onload = function(){ frameworkLoaded = true; checkAndStart(); };
        fs.onerror = function(){ statusEl.innerHTML = '❌ framework.js 加载失败'; };
        document.head.appendChild(fs);

        var ls = document.createElement('script'); ls.src = buildFiles.loaderUrl;
        ls.onload = function(){ loaderLoaded = true; checkAndStart(); };
        ls.onerror = function(){ statusEl.innerHTML = '❌ loader.js 加载失败'; };
        document.head.appendChild(ls);

        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };

            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) document.getElementById('loading-area').style.display = 'none';
            }

            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                unityInstance = instance;
                dpr = window.devicePixelRatio || 1;

                // 画面快速修正序列
                silentCorrect();
                var delays = [100, 200, 400, 700, 1100, 1600];
                for (var i = 0; i < delays.length; i++) {
                    setTimeout(silentCorrect, delays[i]);
                }

                // 确保透明层可见（若之前隐藏过）
                unlockLayer.style.display = 'block';
                syncUnlockLayerSize();
                console.log('🎮 Unity 启动，透明解锁层已覆盖，点击即可解锁音频');
            }

            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
            }

            createUnityInstance(canvas, config, onProgress).then(onSuccess).catch(onError);
        }

        // 初始矫正
        setTimeout(function() {
            dpr = window.devicePixelRatio || 1;
            silentCorrect();
        }, 50);
    </script>
</body>
</html>
