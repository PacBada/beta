<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>文件加载测试</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px;">
<div id="log">检测中...</div>
<script>
var log = document.getElementById('log');
function logMsg(msg) {
    log.innerHTML += msg + '<br>';
    console.log(msg);
}

var files = [
    'Build/PacbadaWebMobileFinal.loader.js',
    'Build/PacbadaWebMobileFinal.framework.js',
    'Build/PacbadaWebMobileFinal.data',
    'Build/PacbadaWebMobileFinal.wasm'
];

files.forEach(function(url) {
    fetch(url)
        .then(function(res) {
            if (res.ok) {
                logMsg('✅ ' + url + ' → 存在 (' + res.status + ')');
            } else {
                logMsg('❌ ' + url + ' → 失败 (' + res.status + ')');
            }
        })
        .catch(function(err) {
            logMsg('❌ ' + url + ' → 错误: ' + err.message);
        });
});
</script>
</body>
</html>
